version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ibms-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ibms
      POSTGRES_USER: ibms
      POSTGRES_PASSWORD: ibms_dev_password
    volumes:
      - ibms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ibms -d ibms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ibms-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ibms_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ibms_pgdata:
    name: ibms_pgdata
  ibms_redisdata:
    name: ibms_redisdata
